<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hediea Store - Links</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 45%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            padding: 45px 30px;
            text-align: center;
            border-radius: 32px;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
        }

        .logo-container {
            width: 135px;
            height: 135px;
            margin: 0 auto 22px;
            border-radius: 50%;
            overflow: hidden;

            display: flex;
            justify-content: center;
            align-items: center;

            background: #ffffff;
            border: 4px solid #e1306c;
            box-shadow: 0 10px 25px rgba(225, 48, 108, 0.25);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .tagline {
            font-size: 15px;
            color: #dddddd;
            margin-bottom: 32px;
            letter-spacing: 0.3px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 15px;
            border-radius: 18px;

            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.35s ease;
        }

        .link-btn i {
            width: 32px;
            font-size: 22px;
            margin-left: 14px;
        }

        .link-btn:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 24px rgba(0, 0, 0, 0.28);
            filter: brightness(1.08);
        }

        /* Social Media Colors */

        .facebook {
            background: #1877f2;
        }

        .instagram {
            background: linear-gradient(
                45deg,
                #f09433,
                #e6683c,
                #dc2743,
                #cc2366,
                #bc1888
            );
        }

        .tiktok {
            background: linear-gradient(
                45deg,
                #000000,
                #111111,
                #1a1a1a
            );
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- Logo -->
        <div class="logo-container">
            <img src="logo.jpg" alt="Hediea Store Logo">
        </div>

        <!-- Store Name -->
        <h1>Hediea Store</h1>
        <p class="tagline">Accessories & Gifts 🎁✨</p>

        <!-- Social Links -->
        <div class="links-container">

            <!-- Facebook -->
            <a href="https://www.facebook.com/profile.php?id=61564464971132"
               target="_blank"
               class="link-btn facebook">
                <i class="fab fa-facebook-f"></i>
                Facebook
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/hediea_store_/"
               target="_blank"
               class="link-btn instagram">
                <i class="fab fa-instagram"></i>
                Instagram
            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@hediea_store?_r=1&_t=ZS-95o4cs0sgHn"
               target="_blank"
               class="link-btn tiktok">
                <i class="fab fa-tiktok"></i>
                TikTok
            </a>

        </div>

    </div>

</body>
</html>
