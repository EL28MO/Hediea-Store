<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hediea Store - Links</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .card {
            width: 90%;
            max-width: 380px;
            padding: 40px 25px;
            text-align: center;
            border-radius: 30px;

            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);

            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .logo-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;

            display: flex;
            justify-content: center;
            align-items: center;

            background: white;
            border: 4px solid #e1306c;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .tagline {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            border-radius: 15px;

            transition: 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-btn i {
            width: 30px;
            font-size: 24px;
            margin-left: 15px;
        }

        .link-btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.15);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        /* Social Colors */

        .facebook {
            background-color: #1877f2;
        }

        .instagram {
            background: linear-gradient(
                45deg,
                #f09433,
                #e6683c,
                #dc2743,
                #cc2366,
                #bc1888
            );
        }

        .tiktok {
            background-color: #000;
        }
    </style>
</head>

<body>

    <div class="card">

        <!-- Logo -->
        <div class="logo-container">
            <img src="logo.jpg" alt="Hediea Store Logo">
        </div>

        <!-- Title -->
        <h1>Hediea Store</h1>
        <p class="tagline">إكسسوارات وهدايا 🎁✨</p>

        <!-- Links -->
        <div class="links-container">

            <!-- Facebook -->
            <a href="https://www.facebook.com/profile.php?id=61564464971132"
               target="_blank"
               class="link-btn facebook">
                <i class="fab fa-facebook-f"></i>
                Facebook
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/hediea_store_/"
               target="_blank"
               class="link-btn instagram">
                <i class="fab fa-instagram"></i>
                Instagram
            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@hediea_store?_r=1&_t=ZS-95o4cs0sgHn"
               target="_blank"
               class="link-btn tiktok">
                <i class="fab fa-tiktok"></i>
                TikTok
            </a>

        </div>

    </div>

</body>
</html>
