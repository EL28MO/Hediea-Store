<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hediea Store</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", Tahoma;
    background: radial-gradient(circle at top, #2b2a5a, #0f0c29);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* CARD */
.card{
    width:92%;
    max-width:420px;
    padding:40px 25px;
    text-align:center;
    border-radius:28px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 25px 60px rgba(0,0,0,0.5);
    animation: fadeIn 0.8s ease;
}

/* LOGO */
.logo{
    width:130px;
    height:130px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:4px solid #e1306c;
    box-shadow:0 0 25px rgba(225,48,108,0.3);
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* TEXT */
h1{
    margin-top:15px;
    font-size:28px;
}

.tagline{
    font-size:14px;
    color:#ddd;
    margin:10px 0 25px;
}

/* LINKS */
.links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px 20px;
    border-radius:15px;
    text-decoration:none;
    color:white;
    font-weight:600;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.btn i{
    font-size:22px;
}

/* hover shine effect */
.btn::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    left:-100%;
    top:0;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
    transition:0.5s;
}

.btn:hover::before{
    left:100%;
}

.btn:hover{
    transform:translateY(-5px);
}

/* COLORS */
.facebook{background:#1877f2;}
.instagram{
    background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
}
.tiktok{
    background:linear-gradient(45deg,#000,#111,#222);
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">
        <img src="logo.jpg" alt="logo">
    </div>

    <h1>Hediea Store</h1>
    <p class="tagline">Accessories & Gifts 🎁✨</p>

    <div class="links">

        <a class="btn facebook" href="https://www.facebook.com/profile.php?id=61564464971132" target="_blank">
            <span>Facebook</span>
            <i class="fab fa-facebook-f"></i>
        </a>

        <a class="btn instagram" href="https://www.instagram.com/hediea_store_/" target="_blank">
            <span>Instagram</span>
            <i class="fab fa-instagram"></i>
        </a>

        <a class="btn tiktok" href="https://www.tiktok.com/@hediea_store?_r=1&_t=ZS-95o4cs0sgHn" target="_blank">
            <span>TikTok</span>
            <i class="fab fa-tiktok"></i>
        </a>

    </div>

</div>

</body>
</html>
