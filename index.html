<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hediea Store | متجر هدايا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1a1a3a, #050510);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden; /* عشان النجوم ماتعملش scroll */
        }

        /* تأثير النجوم في الخلفية */
        body::before {
            content: "";
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            box-shadow: 10vw 20vh 1px white, 50vw 40vh 1px white, 80vw 10vh 1px white, 30vw 70vh 1px white, 70vw 80vh 1px white;
            border-radius: 50%;
            animation: stars 10s linear infinite;
        }

        @keyframes stars {
            from { transform: translateY(0); }
            to { transform: translateY(-100vh); }
        }

        .card {
            width: 92%;
            max-width: 400px;
            padding: 40px 25px;
            text-align: center;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            z-index: 1;
            animation: fadeIn 1s ease-out;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .logo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #1a1a3a;
        }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 5px; }
        .tagline { font-size: 14px; color: #ccc; margin-bottom: 30px; }

        .links { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        /* الألوان المظبوطة */
        .whatsapp { background: #25D366; }
        .facebook { background: #1877f2; }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .tiktok { background: #000000; border: 1px solid #fff; } /* لون التيك توك الأصلي */

        .btn i { font-size: 20px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <img src="logo.jpg" alt="Hediea Store Logo">
    </div>

    <h1>Hediea Store</h1>
    <p class="tagline">للهدايا والإكسسوارات الراقية 🎁✨</p>

    <div class="links">
        <a class="btn whatsapp" href="https://wa.me/2010XXXXXXXX" target="_blank">
            <span>اطلب عبر واتساب</span>
            <i class="fab fa-whatsapp"></i>
        </a>

        <a class="btn facebook" href="https://www.facebook.com/profile.php?id=61564464971132" target="_blank">
            <span>فيسبوك</span>
            <i class="fab fa-facebook-f"></i>
        </a>

        <a class="btn instagram" href="https://www.instagram.com/hediea_store_/" target="_blank">
            <span>إنستجرام</span>
            <i class="fab fa-instagram"></i>
        </a>

        <a class="btn tiktok" href="https://www.tiktok.com/@hediea_store" target="_blank">
            <span>تيك توك</span>
            <i class="fab fa-tiktok"></i>
        </a>
    </div>
</div>

</body>
</html>
