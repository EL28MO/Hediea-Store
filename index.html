<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hediea Store - Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 380px;
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .logo-container {
            width: 130px;
            height: 130px;
            background: #fff;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 4px solid #e1306c;
        }
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 { font-size: 28px; margin-bottom: 5px; font-weight: bold; }
        .tagline { color: #ddd; font-size: 14px; margin-bottom: 30px; }
        .links-container { display: flex; flex-direction: column; gap: 15px; }
        .link-btn {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            text-decoration: none;
            color: white;
            border-radius: 15px;
            font-weight: 600;
            transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .link-btn i { margin-left: 15px; font-size: 24px; width: 30px; }
        .facebook { background-color: #1877f2; }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .whatsapp { background-color: #25d366; }
        .link-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); filter: brightness(1.2); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-container">
            <img src="https://i.postimg.cc/BQ36KC9M/img-1-1777032116225.jpg" alt="Hediea Store Logo">
        </div>
        <h1>Hediea store</h1>
        <p class="tagline">إكسسوارات وهدايا 🎁✨</p>
        <div class="links-container">
            <a href="https://www.facebook.com/profile.php?id=61564464971132" target="_blank" class="link-btn facebook">
                <i class="fab fa-facebook-f"></i> فيسبوك
            </a>
            <a href="https://www.instagram.com/hediea_store_/" target="_blank" class="link-btn instagram">
                <i class="fab fa-instagram"></i> إنستجرام
            </a>
            <a href="https://chat.whatsapp.com/GisLntYvI6KEnO9SgV209f" target="_blank" class="link-btn whatsapp">
                <i class="fab fa-whatsapp"></i> جروب الواتساب
            </a>
        </div>
    </div>
</body>
</html>
